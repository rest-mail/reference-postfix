name: build

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Compute calver tag
        id: tag
        run: |
          DATE=$(date -u +%Y.%m.%d)
          BASE="ghcr.io/${{ github.repository }}"
          N=1
          TAG="$DATE"
          while docker manifest inspect "$BASE:$TAG" >/dev/null 2>&1; do
            N=$((N+1))
            TAG="$DATE.$N"
          done
          echo "calver=$TAG" >>"$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.tag.outputs.calver }}
            ghcr.io/${{ github.repository }}:latest
